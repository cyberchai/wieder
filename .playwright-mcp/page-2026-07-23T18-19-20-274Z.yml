          - heading "3. storing your data" [level=2] [ref=f13e95]
          - paragraph [ref=f13e96]: we only keep your info as long as we need it to run the service. we do our best to protect it from anything sketchy like loss, theft, or unauthorized access. if you delete your account, we will delete your info within 30 days.
