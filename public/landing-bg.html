<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<style>
@import url('https://fonts.googleapis.com/css2?family=Open+Sans+Condensed:wght@300;700&family=Open+Sans:wght@400;600&display=swap');

* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
}

body {
  font-family: 'Open Sans', sans-serif;
  overflow-x: hidden;
  color: white;
  background: black;
}

h2, h3 {
  position: relative;
  text-transform: uppercase;
  font-family: 'Open Sans Condensed', sans-serif;
  font-size: 3rem;
  font-weight: 300;
  letter-spacing: .1em;
  margin: 0 0 .5rem 0;
  text-shadow: 0px 5px 10px rgba(0, 0, 0, 0.5);
}

h3 {
  font-size: 1.5rem;
}

p {
  line-height: 1.6;
  font-size: 1.1rem;
}

.slide {
  position: relative;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  width: 100vw;
  height: 100vh;
}

figure {
  position: relative;
  padding: 50px 80px;
  width: 500px;
  max-width: 90vw;
  opacity: 0;
  transition: opacity 0.5s ease;
}

figure.in {
  opacity: 1;
}

figure.in canvas {
  transform: scale(1);
}

figure.in figcaption {
  opacity: 1;
}

figure.right {
  float: right;
  margin-right: 5%;
}

figure.right canvas {
  left: 0;
}

figure.right figcaption {
  border-left: 2px solid white;
  text-align: left;
  padding-left: 15px;
}

figure.left {
  float: left;
  margin-left: 5%;
}

figure.left canvas {
  right: 0;
}

figure.left figcaption {
  border-right: 2px solid white;
  text-align: right;
  padding-right: 15px;
}

figcaption {
  position: relative;
  padding: 0 10px;
  z-index: 1;
  text-transform: uppercase;
  font-family: 'Open Sans Condensed', sans-serif;
  font-size: 1.2rem;
  opacity: 0;
  transition: opacity 1s ease;
}

figcaption p {
  line-height: 1.5;
  text-transform: none;
  font-family: 'Open Sans', sans-serif;
}

.section {
  width: 100vw;
  height: 100vh;
  display: flex;
  align-items: center;
}

#ground {
  top: 0;
  left: 0;
  position: fixed;
  width: 100%;
  height: 100%;
  z-index: 0;
}

#deck {
  position: relative;
  z-index: 2;
}

.cover {
  text-align: center;
}

.cover h2 {
  font-size: 4rem;
  margin-bottom: 1rem;
}

/* Login button styles */
.login-btn {
  display: inline-block;
  padding: 16px 48px;
  font-size: 1.3rem;
  font-weight: 600;
  text-transform: uppercase;
  letter-spacing: 0.1em;
  color: white;
  background: linear-gradient(135deg, #7e559f 0%, #9f55a0 100%);
  border: none;
  border-radius: 8px;
  cursor: pointer;
  text-decoration: none;
  transition: transform 0.2s, box-shadow 0.2s;
  box-shadow: 0 4px 20px rgba(126, 85, 159, 0.4);
}

.login-btn:hover {
  transform: translateY(-2px);
  box-shadow: 0 6px 30px rgba(126, 85, 159, 0.6);
}

.final-cta {
  text-align: center;
}

.final-cta h2 {
  margin-bottom: 2rem;
}
</style>
</head>
<body>

<script type="x-shader/x-vertex" id="skyVS">
varying vec2 vUv;
varying float time;
uniform float delta;

void main()
{
    vUv = uv;
    gl_Position = projectionMatrix * modelViewMatrix * vec4(position,1.0);
}
</script>

<script type="x-shader/x-fragment" id="skyFS">
#ifdef GL_ES
precision highp float;
#endif

uniform vec2 resolution;
uniform float time;
uniform float delta;

varying vec2 vUv;        

void main(void)
{
    vec2 position = vUv;

    float red = 0.1;
    float green = 0.0;
    float blue = 0.1;
    
    if (vUv.y < 0.85) {
        float offset = 0.1 + (0.85 - vUv.y) * (1.0 + sin(delta * 0.1) * 1.0);
        blue = offset;
        red = offset;
        blue *= 1.0 + cos(vUv.x + delta * 0.3) * 0.05;
    }
    
    if (vUv.y < 0.8) {
        blue += 0.0 + cos(vUv.x + delta * 0.2) * 0.01;
    }

    vec3 rgb = vec3(red, green, blue);
    vec4 color = vec4(rgb, 1.0);
    
    gl_FragColor = color;
}
</script>

// Figure visibility handler
$('figure').each(function() {
  var $fig = $(this);
  window.addEventListener('scroll', function() {
    var figTop = $fig.offset().top;
    var figHeight = $fig.height();
    var scrollTop = window.pageYOffset;
    var windowHeight = window.innerHeight;
    
    if (figTop >= scrollTop - figHeight && figTop <= scrollTop + windowHeight) {
      if (!$fig.hasClass('in')) {
        $fig.addClass('in');
      }
    } else {
      if ($fig.hasClass('in')) {
        $fig.removeClass('in');
      }
    }
  });
});

    }

    for (var i = 0; i < 100; i += 1) {
      var x = -3000 + Math.random() * 6000;
      var y = instance.worldCenter.y + 3500;
      var z = -3000 + Math.random() * 2500;
      x = x > 600 || x < -600 ? x : x + 1200;
      addTree(x, y, z);
    }

    instance.renderer = new THREE.WebGLRenderer({canvas: document.getElementById('ground'), antialias: true});
    instance.renderer.setSize(window.innerWidth, window.innerHeight);

    instance.camera = new THREE.PerspectiveCamera(35, width / height * 2, 2, 10000);
    instance.camera.position.set(0, 850, 2000);
    instance.camera.rotation.set(0, 0, 0);
  }

  function loadModels() {
    var loaded = 0;

    function parseModels(d) {
      models[loaded].geometry = d.geometry;
      models[loaded].materials = d.material || d.materials;
      loaded += 1;
      if (loaded == models.length) {
        modelsLoaded();
      } else {
        var loader = new THREE.JSONLoader();
        var data = loader.parse(models[loaded].json);
        parseModels(data);
      }
    }

    var loader = new THREE.JSONLoader();
    var data = loader.parse(models[loaded].json);
    parseModels(data);
  }

  instance.render = function() {
    instance.d += 0.1;

    if (skyUniforms) {
      skyUniforms.delta.value += 0.1;
    }

    if (instance.water) {
      for (var i = 0; i < instance.water.geometry.vertices.length; i += 1) {
        var vertice = instance.water.geometry.vertices[i];
        if (vertice.y > 3480) {
          vertice.y = 3500 + Math.sin(instance.d + i + vertice.z) * 10;
        } else if (vertice.x > 1450) {
          vertice.x = 1500 + Math.sin(instance.d + i + vertice.y) * 30;
        }
      }
      instance.water.geometry.verticesNeedUpdate = true;
    }

    if (instance.clouds) {
      for (var i = 0; i < instance.clouds.length; i += 1) {
        instance.clouds[i].position.x += 1;
        if (instance.clouds[i].position.x > 6000) {
          instance.clouds[i].position.x = -6000;
        }
      }
    }

    if (instance.camera && instance.renderer) {
      var rect = document.documentElement.getBoundingClientRect();
      var scrollPercent = document.documentElement.scrollTop / (rect.height - window.innerHeight);
      var scrollPos = -6661 * scrollPercent;

      instance.camera.position.y = 850 + scrollPos;
      instance.spotLight.position.y = scrollPos + 2000;
      if (instance.spotLight.target) {
        instance.spotLight.target.position.y = scrollPos + 1000;
      }

      instance.renderer.render(instance.scene, instance.camera);
    }
  };

  instance.resize = function() {
    if (instance.renderer) {
      width = window.innerWidth;
      height = window.innerHeight;
      instance.renderer.setSize(width, height);
      instance.camera = new THREE.PerspectiveCamera(35, width / height * 2, 2, 10000);
      instance.camera.position.set(0, 850, 2000);
      instance.camera.rotation.set(0, 0, 0);
      instance.renderer.render(instance.scene, instance.camera);
    }
  };
};

var bg = new Background();

function render() {
  bg.render();
  requestAnimationFrame(render);
}

requestAnimationFrame(render);
window.addEventListener('resize', bg.resize);
</script>
